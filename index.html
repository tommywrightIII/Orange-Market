<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Orange Market</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;600;700&family=Manrope:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0d;
    --surface: #161616;
    --card: #1c1c1c;
    --border: #2a2a2a;
    --accent: #FF6B00;
    --accent-dim: #e05e00;
    --text: #f0f0f0;
    --muted: #777;
    --danger: #ff4444;
    --good: #4cff91;
    --warn: #ffb800;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Manrope', sans-serif; overflow-x: hidden; }

  /* ── NAV ── */
  .nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    display: flex; align-items: stretch; height: 52px;
  }
  .nav-tab {
    flex: 1; display: flex; align-items: center; justify-content: center;
    gap: 6px; font-family: 'Unbounded', sans-serif; font-size: 11px;
    font-weight: 600; color: var(--muted); cursor: pointer;
    border-bottom: 2px solid transparent; transition: all .2s;
    background: none; border-top: none; border-left: none; border-right: none;
    letter-spacing: .03em;
  }
  .nav-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-tab .badge {
    background: var(--accent); color: #000; border-radius: 8px;
    padding: 1px 6px; font-size: 9px; font-weight: 700; display: none;
  }

  /* ── PAGES ── */
  .page { display: none; padding: 60px 0 20px; min-height: 100vh; }
  .page.active { display: block; }

  /* ── HEADER BAND ── */
  .shop-header {
    padding: 20px 16px 12px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 4px;
  }
  .shop-title { font-family: 'Unbounded', sans-serif; font-size: 20px; font-weight: 700; letter-spacing: -.02em; }
  .shop-title span { color: var(--accent); }
  .shop-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }

  /* ── FILTER BAR ── */
  .filter-bar {
    padding: 10px 16px; display: flex; gap: 8px; overflow-x: auto;
    scrollbar-width: none;
  }
  .filter-bar::-webkit-scrollbar { display: none; }
  .chip {
    white-space: nowrap; padding: 5px 12px; border-radius: 20px;
    font-size: 11px; font-weight: 600; font-family: 'Unbounded', sans-serif;
    border: 1px solid var(--border); color: var(--muted);
    background: transparent; cursor: pointer; transition: all .2s;
    letter-spacing: .02em;
  }
  .chip.active { background: var(--accent); color: #000; border-color: var(--accent); }

  /* ── CATALOG GRID ── */
  .grid {
    display: grid; grid-template-columns: repeat(2, 1fr);
    gap: 12px; padding: 12px 12px;
  }

  /* ── PRODUCT CARD ── */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden;
    display: flex; flex-direction: column;
    transition: transform .15s, border-color .15s;
    cursor: pointer;
  }
  .card:active { transform: scale(0.97); }
  .card-img {
    aspect-ratio: 1; background: var(--surface);
    display: flex; align-items: center; justify-content: center;
    font-size: 54px; position: relative; overflow: hidden;
  }
  .card-img img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; border-radius: 0;
  }
  .card-sold-overlay {
    position: absolute; inset: 0; background: rgba(0,0,0,.65);
    display: flex; align-items: center; justify-content: center;
    font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700;
    color: var(--danger); letter-spacing: .05em; border-radius: 0;
  }
  .card-body { padding: 10px; display: flex; flex-direction: column; gap: 5px; flex: 1; }
  .card-brand { font-size: 10px; color: var(--muted); font-weight: 500; text-transform: uppercase; letter-spacing: .06em; }
  .card-name { font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 600; line-height: 1.3; }
  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; }
  .tag {
    font-size: 9px; font-weight: 600; padding: 2px 6px; border-radius: 5px;
    background: var(--surface); border: 1px solid var(--border); color: var(--muted);
    font-family: 'Unbounded', sans-serif; letter-spacing: .02em;
  }
  .tag.cond-10 { color: var(--good); border-color: var(--good); }
  .tag.cond-9  { color: var(--good); border-color: #2aaa60; }
  .tag.cond-8  { color: var(--warn); border-color: var(--warn); }
  .tag.cond-7  { color: #ff8800; border-color: #ff8800; }
  .tag.cond-low{ color: var(--danger); border-color: var(--danger); }
  .card-price { font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 700; color: var(--accent); margin-top: auto; padding-top: 4px; }
  .card-btn {
    margin: 0 10px 10px; padding: 9px;
    background: var(--accent); color: #000;
    border: none; border-radius: 10px;
    font-family: 'Unbounded', sans-serif; font-size: 10px; font-weight: 700;
    cursor: pointer; transition: opacity .15s; letter-spacing: .03em;
  }
  .card-btn:disabled { background: var(--border); color: var(--muted); cursor: default; }
  .card-btn:not(:disabled):active { opacity: .8; }

  /* ── MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 200;
    background: rgba(0,0,0,.7); backdrop-filter: blur(4px);
    align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 24px 24px 0 0;
    width: 100%; max-height: 90vh; overflow-y: auto;
    padding: 20px 16px 32px; border-top: 1px solid var(--border);
    animation: slideUp .25s ease;
  }
  @keyframes slideUp { from { transform: translateY(40px); opacity: 0; } }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-img { font-size: 80px; text-align: center; background: var(--card); border-radius: 16px; margin-bottom: 16px; overflow: hidden; position: relative; min-height: 200px; display: flex; align-items: center; justify-content: center; cursor: pointer; }
  .modal-img img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; border-radius: 16px; }
  .slider { position: relative; width: 100%; aspect-ratio: 1; background: var(--card); border-radius: 16px; overflow: hidden; margin-bottom: 16px; cursor: pointer; }
  .slider-track { display: flex; width: 100%; height: 100%; transition: transform .3s ease; }
  .slider-slide { min-width: 100%; height: 100%; object-fit: cover; }
  .slider-dots { position: absolute; bottom: 8px; left: 0; right: 0; display: flex; justify-content: center; gap: 5px; z-index: 2; }
  .slider-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,.4); transition: background .2s; }
  .slider-dot.active { background: white; }
  .slider-btn { position: absolute; top: 50%; transform: translateY(-50%); z-index: 2; background: rgba(0,0,0,.5); border: none; color: white; width: 28px; height: 28px; border-radius: 50%; font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .slider-btn.prev { left: 8px; }
  .slider-btn.next { right: 8px; }
  .photo-fullscreen {
    display: none; position: fixed; inset: 0; z-index: 300;
    background: rgba(0,0,0,.95); align-items: center; justify-content: center;
    cursor: zoom-out;
  }
  .photo-fullscreen.open { display: flex; }
  .photo-fullscreen img { max-width: 100%; max-height: 100vh; object-fit: contain; border-radius: 8px; }
  .modal-brand { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
  .modal-name { font-family: 'Unbounded', sans-serif; font-size: 18px; font-weight: 700; margin-bottom: 12px; line-height: 1.3; }
  .modal-price { font-family: 'Unbounded', sans-serif; font-size: 26px; font-weight: 700; color: var(--accent); margin-bottom: 16px; }
  .modal-props { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .prop { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 10px; }
  .prop-label { font-size: 10px; color: var(--muted); margin-bottom: 3px; text-transform: uppercase; letter-spacing: .05em; }
  .prop-val { font-size: 13px; font-weight: 600; }
  .modal-desc { font-size: 13px; color: #aaa; line-height: 1.6; margin-bottom: 20px; padding: 12px; background: var(--card); border-radius: 10px; border: 1px solid var(--border); }
  .modal-btn {
    width: 100%; padding: 15px; border-radius: 14px;
    background: var(--accent); color: #000; border: none;
    font-family: 'Unbounded', sans-serif; font-size: 13px; font-weight: 700;
    cursor: pointer; letter-spacing: .03em;
  }
  .modal-btn:disabled { background: var(--border); color: var(--muted); cursor: default; }

  /* ── LOGS PAGE ── */
  .logs-header { padding: 20px 16px 10px; }
  .logs-title { font-family: 'Unbounded', sans-serif; font-size: 18px; font-weight: 700; }
  .log-item {
    margin: 8px 12px; background: var(--card);
    border: 1px solid var(--border); border-radius: 14px; padding: 14px;
  }
  .log-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
  .log-name { font-size: 13px; font-weight: 600; }
  .log-time { font-size: 10px; color: var(--muted); }
  .log-tag { display: inline-block; font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 6px; font-family: 'Unbounded', sans-serif; }
  .log-tag.sold { background: #4cff9122; color: var(--good); }
  .log-tag.added { background: #FF6B0022; color: var(--accent); }
  .log-tag.removed { background: #ff444422; color: var(--danger); }
  .log-price { font-family: 'Unbounded', sans-serif; font-size: 15px; font-weight: 700; margin-top: 4px; }

  /* ── ADMIN PAGE ── */
  .admin-header { padding: 16px 16px 8px; border-bottom: 1px solid var(--border); margin-bottom: 8px; }
  .admin-title { font-family: 'Unbounded', sans-serif; font-size: 16px; font-weight: 700; }
  .admin-sub { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .admin-items { padding: 0 12px; }
  .admin-item {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 14px; padding: 12px; margin-bottom: 8px;
    display: flex; gap: 12px; align-items: center;
  }
  .admin-emoji { font-size: 32px; min-width: 44px; text-align: center; }
  .admin-info { flex: 1; }
  .admin-name { font-size: 13px; font-weight: 600; }
  .admin-meta { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .admin-price { font-family: 'Unbounded', sans-serif; font-size: 14px; color: var(--accent); font-weight: 700; }
  .admin-actions { display: flex; flex-direction: column; gap: 5px; }
  .btn-edit, .btn-del, .btn-toggle {
    padding: 5px 10px; border-radius: 7px; font-size: 10px; font-weight: 700;
    font-family: 'Unbounded', sans-serif; cursor: pointer; border: none; transition: opacity .15s;
  }
  .btn-edit { background: #2a2a2a; color: var(--text); }
  .btn-del { background: #ff444422; color: var(--danger); }
  .btn-toggle { background: #FF6B0022; color: var(--accent); font-size: 9px; }

  /* ── ADD FORM ── */
  .add-form { padding: 12px; }
  .add-form-title { font-family: 'Unbounded', sans-serif; font-size: 14px; font-weight: 700; margin-bottom: 14px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 11px; color: var(--muted); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .05em; font-weight: 600; }
  .field input, .field select, .field textarea {
    width: 100%; background: var(--card); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 12px; color: var(--text); font-size: 13px;
    font-family: 'Manrope', sans-serif; outline: none; transition: border-color .2s;
  }
  .field input:focus, .field select:focus, .field textarea:focus { border-color: var(--accent); }
  .field select option { background: var(--card); }
  .field textarea { resize: vertical; min-height: 70px; }
  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .btn-add-submit {
    width: 100%; padding: 13px; border-radius: 12px;
    background: var(--accent); color: #000; border: none;
    font-family: 'Unbounded', sans-serif; font-size: 12px; font-weight: 700;
    cursor: pointer; letter-spacing: .03em; margin-top: 4px;
  }

  .empty-state { text-align: center; padding: 60px 20px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; }

  .section-divider { font-family: 'Unbounded', sans-serif; font-size: 10px; color: var(--muted); letter-spacing: .06em; padding: 12px 16px 4px; text-transform: uppercase; }
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
  <button class="nav-tab active" id="tab-catalog" onclick="showPage('catalog')">🛍 КАТАЛОГ</button>
  <button class="nav-tab" id="tab-logs" onclick="showPage('logs')" style="display:none">📋 ЛОГИ</button>
  <button class="nav-tab" id="tab-admin" onclick="showPage('admin')" style="display:none">⚙️ ADMIN</button>
</div>

<!-- ══════════════ CATALOG PAGE ══════════════ -->
<div class="page active" id="page-catalog">
  <div class="shop-header">
    <div class="shop-title">Orange Market</div>
    <div class="shop-sub">Быстрая доставка · Честные цены · Моментальная связь</div>
  </div>
  <div class="filter-bar" id="filter-bar">
    <button class="chip active" onclick="filterCat('all')">Все</button>
    <button class="chip" onclick="filterCat('shoes')">Кроссовки</button>
    <button class="chip" onclick="filterCat('clothes')">Одежда</button>
    <button class="chip" onclick="filterCat('accessories')">Аксессуары</button>
    <button class="chip" onclick="filterCat('bags')">Сумки</button>
    <button class="chip" onclick="filterCat('other')">Другое</button>
  </div>
  <div class="grid" id="catalog-grid"></div>
</div>

<!-- ══════════════ LOGS PAGE ══════════════ -->
<div class="page" id="page-logs">
  <div class="logs-header">
    <div style="display:flex;justify-content:space-between;align-items:center;">
      <div class="logs-title">Лог действий</div>
      <button onclick="clearLogs()" style="padding:6px 12px;background:transparent;border:1px solid var(--danger);border-radius:8px;color:var(--danger);font-family:'Unbounded',sans-serif;font-size:10px;font-weight:700;cursor:pointer;">ОЧИСТИТЬ</button>
    </div>
  </div>
  <div id="logs-list"></div>
</div>

<!-- ══════════════ ADMIN PAGE ══════════════ -->
<div class="page" id="page-admin">
  <div class="admin-header">
    <div class="admin-title">⚙️ Админ-панель</div>
    <div class="admin-sub">Управление каталогом</div>
  </div>

  <!-- ADD FORM -->
  <div class="add-form">
    <div class="add-form-title" id="form-title">+ Добавить товар</div>
    <input type="hidden" id="edit-id">
    <div class="form-row">
      <div class="field">
        <label>Бренд</label>
        <input type="text" id="f-brand" placeholder="Nike">
      </div>
      <div class="field">
        <label>Название</label>
        <input type="text" id="f-name" placeholder="Air Force 1">
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Категория</label>
        <select id="f-cat">
          <option value="shoes">Кроссовки</option>
          <option value="clothes">Одежда</option>
          <option value="accessories">Аксессуары</option>
          <option value="bags">Сумки</option>
          <option value="other">Другое</option>
        </select>
      </div>
      <div class="field">
        <label>Размер</label>
        <input type="text" id="f-size" placeholder="42 / L / ONE">
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Цена (₽)</label>
        <input type="number" id="f-price" placeholder="12500">
      </div>
      <div class="field">
        <label>Цена ($) необязательно</label>
        <input type="number" id="f-price-usd" placeholder="135">
      </div>
    </div>
    <div class="form-row">
      <div class="field">
        <label>Состояние (1-10)</label>
        <input type="number" id="f-cond" placeholder="9" min="1" max="10">
      </div>
    </div>
    <div class="field">
      <label>Описание / дефекты</label>
      <textarea id="f-desc" placeholder="Куплены год назад, носились 3 раза. Небольшая потёртость на носке..."></textarea>
    </div>
    <div class="field">
      <label>Эмодзи товара (если нет фото)</label>
      <input type="text" id="f-emoji" placeholder="👟" maxlength="2">
    </div>
    <div class="field">
      <label>Фото (до 5 штук) — ссылки с imgur.com</label>
      <input type="text" id="f-photo-1" placeholder="Фото 1 https://i.imgur.com/xxx.jpg" style="margin-bottom:6px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:12px;font-family:'Manrope',sans-serif;outline:none;">
      <input type="text" id="f-photo-2" placeholder="Фото 2 (необязательно)" style="margin-bottom:6px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:12px;font-family:'Manrope',sans-serif;outline:none;">
      <input type="text" id="f-photo-3" placeholder="Фото 3 (необязательно)" style="margin-bottom:6px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:12px;font-family:'Manrope',sans-serif;outline:none;">
      <input type="text" id="f-photo-4" placeholder="Фото 4 (необязательно)" style="margin-bottom:6px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:12px;font-family:'Manrope',sans-serif;outline:none;">
      <input type="text" id="f-photo-5" placeholder="Фото 5 (необязательно)" style="width:100%;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;color:var(--text);font-size:12px;font-family:'Manrope',sans-serif;outline:none;">
    </div>
    <button class="btn-add-submit" onclick="submitProduct()">Сохранить товар</button>
    <button id="cancel-edit-btn" style="display:none; width:100%; padding:11px; margin-top:8px; border-radius:12px; background:transparent; border:1px solid var(--border); color:var(--muted); font-family:'Unbounded',sans-serif; font-size:11px; cursor:pointer;" onclick="cancelEdit()">Отмена</button>
  </div>

  <div class="section-divider">Товары в каталоге</div>
  <div class="admin-items" id="admin-items"></div>
</div>

<!-- ══════════════ PRODUCT MODAL ══════════════ -->
<div class="photo-fullscreen" id="photo-fullscreen" onclick="closeFullscreen()">
  <img id="photo-fullscreen-img" src="" alt="">
</div>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal">
    <div class="modal-handle"></div>
    <div class="modal-img" id="modal-img"></div>
    <div class="modal-brand" id="modal-brand"></div>
    <div class="modal-name" id="modal-name"></div>
    <div class="modal-price" id="modal-price"></div>
    <div class="modal-props" id="modal-props"></div>
    <div class="modal-desc" id="modal-desc"></div>
    <button class="modal-btn" id="modal-btn" onclick="contactSeller()"></button>
  </div>
</div>

<script>
// ══════ DATA ══════
const SELLER_USERNAME = 'orangedime';

let items = [];

let currentCat = 'all';
let currentItem = null;
let isAdmin = false;

// ══════ INIT ══════
async function init() {
  const params = new URLSearchParams(window.location.search);
  isAdmin = params.get('admin') === '1';
  if (isAdmin) {
    document.getElementById('tab-admin').style.display = 'flex';
    document.getElementById('tab-logs').style.display = 'flex';
  }

  Telegram.WebApp.ready();
  Telegram.WebApp.expand();

  await loadItems();
  renderLogs();
  if (isAdmin) renderAdmin();
}

async function loadItems() {
  try {
    const res = await fetch(`${API_URL}/api/items`);
    items = await res.json();
    renderCatalog();
    if (isAdmin) renderAdmin();
  } catch(e) {
    console.error('Ошибка загрузки товаров', e);
    renderCatalog();
  }
}

function save() {
  const storedLogs = localStorage.getItem('resale_logs_v1');
  logs = storedLogs ? JSON.parse(storedLogs) : [];
  localStorage.setItem('resale_logs_v1', JSON.stringify(logs.slice(0, 100)));
}

function addLog(type, item) {

  logs.unshift({

    type,
    name: `${item.brand} ${item.name}`,
    price: item.price,
    time: new Date().toLocaleString('ru-RU'),
    size: item.size,
  });

  renderLogs();
}

  });
  save();
  renderLogs();
}

// ══════ PAGES ══════
function showPage(page) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  document.getElementById('tab-' + page).classList.add('active');
  if (page === 'admin') renderAdmin();
}

// ══════ CATALOG ══════
function filterCat(cat) {
  currentCat = cat;
  document.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
  event.target.classList.add('active');
  renderCatalog();
}

function condClass(c) {
  if (c >= 10) return 'cond-10';
  if (c >= 9) return 'cond-9';
  if (c >= 8) return 'cond-8';
  if (c >= 7) return 'cond-7';
  return 'cond-low';
}

function renderCatalog() {
  const grid = document.getElementById('catalog-grid');
  const filtered = items.filter(i => currentCat === 'all' || i.cat === currentCat);
  if (filtered.length === 0) {
    grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="empty-icon">🔍</div><div class="empty-text">Товаров пока нет</div></div>';
    return;
  }
  grid.innerHTML = filtered.map(item => `
    <div class="card" onclick="openModal(${item.id})">
      <div class="card-img">
        ${(item.photos && item.photos[0]) || item.photo ? `<img src="${item.photos && item.photos[0] ? item.photos[0] : item.photo}" alt="${item.name}" onerror="this.style.display='none'">` : ''}
        <span style="position:relative;z-index:1">${(item.photos && item.photos[0]) || item.photo ? '' : (item.emoji || '📦')}</span>
        ${item.sold ? '<div class="card-sold-overlay">ПРОДАНО</div>' : ''}
      </div>
      <div class="card-body">
        <div class="card-brand">${item.brand}</div>
        <div class="card-name">${item.name}</div>
        <div class="card-tags">
          <span class="tag">р. ${item.size}</span>
          <span class="tag ${condClass(item.cond)}">${item.cond}/10</span>
        </div>
        <div class="card-price">${Number(item.price).toLocaleString('ru-RU')} ₽${item.priceUsd ? ` / ${item.priceUsd} $` : ''}</div>
      </div>
      <button class="card-btn" ${item.sold ? 'disabled' : ''} onclick="event.stopPropagation(); openModal(${item.id})">${item.sold ? 'ПРОДАНО' : 'ПОДРОБНЕЕ'}</button>
    </div>
  `).join('');
}

// ══════ MODAL ══════
function openModal(id) {
  currentItem = items.find(i => i.id === id);
  if (!currentItem) return;
  const i = currentItem;
  const photos = i.photos && i.photos.length ? i.photos : (i.photo ? [i.photo] : []);
  const modalImg = document.getElementById('modal-img');
  if (photos.length > 1) {
    modalImg.outerHTML = `<div class="slider" id="modal-img" onclick="openFullscreen(sliderPhotos[sliderIndex])">
      <div class="slider-track" id="slider-track">
        ${photos.map(p => `<img class="slider-slide" src="${p}" onerror="this.style.opacity=0">`).join('')}
      </div>
      ${photos.length > 1 ? `<button class="slider-btn prev" onclick="event.stopPropagation();slideMove(-1)">‹</button><button class="slider-btn next" onclick="event.stopPropagation();slideMove(1)">›</button>` : ''}
      <div class="slider-dots">${photos.map((_,idx) => `<div class="slider-dot ${idx===0?'active':''}" id="dot-${idx}"></div>`).join('')}</div>
    </div>`;
    sliderPhotos = photos;
    sliderIndex = 0;
  } else if (photos.length === 1) {
    modalImg.outerHTML = `<div class="modal-img" id="modal-img" onclick="openFullscreen('${photos[0]}')">
      <img src="${photos[0]}" alt="${i.name}" onerror="this.style.display='none'">
    </div>`;
  } else {
    modalImg.outerHTML = `<div class="modal-img" id="modal-img" style="font-size:80px;padding:20px 0">${i.emoji || '📦'}</div>`;
  }
  document.getElementById('modal-brand').textContent = i.brand;
  document.getElementById('modal-name').textContent = i.name;
  document.getElementById('modal-price').textContent = Number(i.price).toLocaleString('ru-RU') + ' ₽' + (i.priceUsd ? ` / ${i.priceUsd} $` : '');
  document.getElementById('modal-desc').textContent = i.desc || 'Описание не указано';
  document.getElementById('modal-props').innerHTML = `
    <div class="prop"><div class="prop-label">Размер</div><div class="prop-val">${i.size}</div></div>
    <div class="prop"><div class="prop-label">Состояние</div><div class="prop-val ${condClass(i.cond)}" style="color: inherit">${i.cond}/10</div></div>
    <div class="prop"><div class="prop-label">Категория</div><div class="prop-val">${catLabel(i.cat)}</div></div>
    <div class="prop"><div class="prop-label">Статус</div><div class="prop-val" style="color: ${i.sold ? 'var(--danger)' : 'var(--good)'}">${i.sold ? 'Продано' : 'В наличии'}</div></div>
  `;
  const btn = document.getElementById('modal-btn');
  btn.disabled = i.sold;
  btn.textContent = i.sold ? 'ТОВАР ПРОДАН' : '✉️ НАПИСАТЬ ПРОДАВЦУ';
  document.getElementById('modal-overlay').classList.add('open');
}

let sliderPhotos = [];
let sliderIndex = 0;

function slideMove(dir) {
  sliderIndex = (sliderIndex + dir + sliderPhotos.length) % sliderPhotos.length;
  document.getElementById('slider-track').style.transform = `translateX(-${sliderIndex * 100}%)`;
  document.querySelectorAll('.slider-dot').forEach((d, i) => d.classList.toggle('active', i === sliderIndex));
}

function openFullscreen(url) {
  document.getElementById('photo-fullscreen-img').src = url;
  document.getElementById('photo-fullscreen').classList.add('open');
}

function closeFullscreen() {
  document.getElementById('photo-fullscreen').classList.remove('open');
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

function contactSeller() {
  if (!currentItem || currentItem.sold) return;
  const text = encodeURIComponent(`Привет! Интересует: ${currentItem.brand} ${currentItem.name}, р.${currentItem.size}, ${Number(currentItem.price).toLocaleString('ru-RU')}₽`);
  window.open(`https://t.me/${SELLER_USERNAME}?text=${text}`, '_blank');
}

function catLabel(cat) {
  return { shoes: 'Кроссовки', clothes: 'Одежда', accessories: 'Аксессуары', bags: 'Сумки', other: 'Другое' }[cat] || cat;
}

// ══════ LOGS ══════
function clearLogs() {
  Telegram.WebApp.showConfirm('Очистить все логи?', (ok) => {
    if (!ok) return;
    logs = [];
    save();
    renderLogs();
  });
}

function renderLogs() {
  const list = document.getElementById('logs-list');
  if (logs.length === 0) {
    list.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">Пока нет активности</div></div>';
    return;
  }
  list.innerHTML = logs.map(l => `
    <div class="log-item">
      <div class="log-top">
        <span class="log-name">${l.name}</span>
        <span class="log-tag ${l.type}">${{sold:'ПРОДАН', added:'ДОБАВЛЕН', removed:'УДАЛЁН', toggled:'ИЗМЕНЁН'}[l.type] || l.type}</span>
      </div>
      <div class="log-time">${l.time} · Размер: ${l.size}</div>
      <div class="log-price">${Number(l.price).toLocaleString('ru-RU')} ₽</div>
    </div>
  `).join('');
}

// ══════ ADMIN ══════
function renderAdmin() {
  const container = document.getElementById('admin-items');
  if (items.length === 0) {
    container.innerHTML = '<div class="empty-state"><div class="empty-icon">📦</div><div class="empty-text">Каталог пуст</div></div>';
    return;
  }
  container.innerHTML = items.map(i => `
    <div class="admin-item">
      <div class="admin-emoji" style="position:relative;overflow:hidden;border-radius:8px;width:44px;height:44px;background:var(--surface);display:flex;align-items:center;justify-content:center;">
        ${(i.photos && i.photos[0]) || i.photo ? `<img src="${i.photos && i.photos[0] ? i.photos[0] : i.photo}" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;" onerror="this.style.display='none'">` : ''}
        <span style="position:relative;z-index:1;font-size:${(i.photos && i.photos[0]) || i.photo ? '0' : '28'}px">${i.emoji || '📦'}</span>
      </div>
      <div class="admin-info">
        <div class="admin-name">${i.brand} ${i.name}</div>
        <div class="admin-meta">р.${i.size} · ${i.cond}/10 · ${i.sold ? '🔴 Продан' : '🟢 В наличии'}</div>
        <div class="admin-price">${Number(i.price).toLocaleString('ru-RU')} ₽</div>
      </div>
      <div class="admin-actions">
        <button class="btn-edit" onclick="startEdit(${i.id})">✏️</button>
        <button class="btn-toggle" onclick="toggleSold(${i.id})">${i.sold ? '↩️' : '✅'}</button>
        <button class="btn-del" onclick="deleteItem(${i.id})">🗑</button>
      </div>
    </div>
  `).join('');
}

async function submitProduct() {
  const brand = document.getElementById('f-brand').value.trim();
  const name = document.getElementById('f-name').value.trim();
  const cat = document.getElementById('f-cat').value;
  const size = document.getElementById('f-size').value.trim();
  const price = parseInt(document.getElementById('f-price').value);
  const priceUsd = parseInt(document.getElementById('f-price-usd').value) || 0;
  const cond = parseInt(document.getElementById('f-cond').value);
  const desc = document.getElementById('f-desc').value.trim();
  const photos = [1,2,3,4,5].map(n => document.getElementById(`f-photo-${n}`).value.trim()).filter(Boolean);
  const editId = document.getElementById('edit-id').value;
  const emoji = document.getElementById('f-emoji').value.trim() || '📦';

  if (!brand || !name || !size || !price || !cond) {
    Telegram.WebApp.showAlert('Заполни все обязательные поля!');
    return;
  }
  if (cond < 1 || cond > 10) {
    Telegram.WebApp.showAlert('Состояние должно быть от 1 до 10');
    return;
  }

  const payload = { brand, name, cat, size, price, priceUsd, cond, desc, emoji, photos };

  try {
    if (editId) {
      const item = items.find(i => i.id === parseInt(editId));
      await fetch(`${API_URL}/api/items/${editId}`, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Token': ADMIN_TOKEN },
        body: JSON.stringify({ ...payload, sold: item ? item.sold : 0 })
      });
      addLog('toggled', { ...payload, size });
    } else {
      await fetch(`${API_URL}/api/items`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Admin-Token': ADMIN_TOKEN },
        body: JSON.stringify(payload)
      });
      addLog('added', { ...payload, size });
    }
    await loadItems();
    clearForm();
  } catch(e) {
    Telegram.WebApp.showAlert('Ошибка сохранения!');
  }
}

function startEdit(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  document.getElementById('edit-id').value = id;
  document.getElementById('f-brand').value = item.brand;
  document.getElementById('f-name').value = item.name;
  document.getElementById('f-cat').value = item.cat;
  document.getElementById('f-size').value = item.size;
  document.getElementById('f-price').value = item.price;
  document.getElementById('f-price-usd').value = item.price_usd || item.priceUsd || '';
  document.getElementById('f-cond').value = item.cond;
  document.getElementById('f-desc').value = item.desc || '';
  document.getElementById('f-emoji').value = item.emoji || '';
  const photos = item.photos || [];
  [1,2,3,4,5].forEach(n => {
    document.getElementById(`f-photo-${n}`).value = photos[n-1] || '';
  });
  document.getElementById('form-title').textContent = '✏️ Редактировать товар';
  document.getElementById('cancel-edit-btn').style.display = 'block';
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function cancelEdit() {
  clearForm();
}

function clearForm() {
  ['f-brand','f-name','f-size','f-price','f-price-usd','f-cond','f-desc','f-emoji','f-photo-1','f-photo-2','f-photo-3','f-photo-4','f-photo-5'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('edit-id').value = '';
  document.getElementById('form-title').textContent = '+ Добавить товар';
  document.getElementById('cancel-edit-btn').style.display = 'none';
}

async function toggleSold(id) {
  const item = items.find(i => i.id === id);
  if (!item) return;
  try {
    await fetch(`${API_URL}/api/items/${id}/toggle`, {
      method: 'PATCH',
      headers: { 'X-Admin-Token': ADMIN_TOKEN }
    });
    addLog(item.sold ? 'toggled' : 'sold', item);
    await loadItems();
  } catch(e) {
    Telegram.WebApp.showAlert('Ошибка!');
  }
}

function deleteItem(id) {
  Telegram.WebApp.showConfirm('Удалить этот товар?', async (ok) => {
    if (!ok) return;
    try {
      const item = items.find(i => i.id === id);
      await fetch(`${API_URL}/api/items/${id}`, {
        method: 'DELETE',
        headers: { 'X-Admin-Token': ADMIN_TOKEN }
      });
      if (item) addLog('removed', item);
      await loadItems();
    } catch(e) {
      Telegram.WebApp.showAlert('Ошибка удаления!');
    }
  });
}

init();
</script>
